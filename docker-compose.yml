services:
  backend:
    build: ./backend
    # image: ghcr.io/shniranjan/null-backend:latest
    container_name: null-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - XCPNG_DB_PATH=/data/null.db
    volumes:
      - ./data:/data
      - ./backend/app:/app/app:ro
    restart: unless-stopped
    networks:
      - null

  frontend:
    build: ./frontend
    # image: ghcr.io/shniranjan/null-frontend:latest
    container_name: null-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - null

networks:
  null:
    driver: bridge
