version: "3.8"

services:
  "null":
    build: .
    image: ghcr.io/shniranjan/null:latest
    container_name: "null"
    ports:
      - "8000:8000"
    environment:
      - XCPNG_MANAGER_SECRET=${XCPNG_MANAGER_SECRET:-null-dev-secret-change-in-production}
      - XCPNG_DB_PATH=/data/null.db
    volumes:
      - ./data:/data
    restart: unless-stopped
